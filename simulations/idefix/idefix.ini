[Grid]
  X1-grid    1    0.0    128    u    6.283185307179586
  X2-grid    1    0.0    128    u    6.283185307179586

[TimeIntegrator]
  CFL        0.3
  CFL_max_var 1.1
  nstages    2
  tstop      50.0
  first_dt   1e-4

[Hydro]
  gamma       1.6666666666666667
  solver      hlld
  emf         uct_contact
  viscosity   explicit  constant  1e-3
  resistivity explicit  constant  1e-3

[Boundary]
  X1-beg     periodic
  X1-end     periodic
  X2-beg     periodic
  X2-end     periodic

[Output]
  vtk        0.05
  log        100
